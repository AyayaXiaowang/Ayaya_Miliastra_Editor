<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例 UI - 3</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1d1d23;
        color: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      :root {
        --safe-margin: 16px;
        --gap: 12px;
      }

      .page-root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .top-actions {
        position: absolute;
        top: var(--safe-margin);
        left: var(--safe-margin);
        display: flex;
        gap: var(--gap);
        z-index: 2000;
      }

      button.btn {
        display: inline-flex;
        align-items: stretch;
        justify-content: stretch;
        height: 38px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #ffffff;
        cursor: pointer;
      }

      .btn-text {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        flex: 1 1 auto;
        min-width: 0;
        font-size: 16px;
        line-height: 1;
      }

      .header-bar {
        position: absolute;
        top: calc(var(--safe-margin) + 52px);
        left: 0;
        right: 0;
        display: flex;
        justify-content: center;
        gap: 10px;
        z-index: 1500;
        pointer-events: none;
      }

      .header-chip {
        height: 38px;
        min-width: 180px;
        padding: 0 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      .title-chip {
        min-width: 260px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="page-root">
      <div class="top-actions" data-ui-component-key="top_actions">
        <button class="btn" data-ui-key="btn_exit" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_exit_text"
            data-ui-text="退出"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >退出</span
          >
        </button>
        <button class="btn" data-ui-key="btn_level_select" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_level_select_text"
            data-ui-text="关卡选择"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >关卡选择</span
          >
        </button>
      </div>

      <div class="header-bar">
        <div
          class="header-chip title-chip"
          data-ui-key="header_title"
          data-ui-text-align="center"
          data-ui-text-valign="middle"
        >
          关卡标题
        </div>
        <div
          class="header-chip"
          data-ui-key="room_title"
          data-ui-text-align="center"
          data-ui-text-valign="middle"
        >
          房间标题
        </div>
        <div
          class="header-chip"
          data-ui-key="room_timer_text"
          data-ui-text-align="center"
          data-ui-text-valign="middle"
        >
          00:30
        </div>
      </div>
    </div>
  </body>
</html>
