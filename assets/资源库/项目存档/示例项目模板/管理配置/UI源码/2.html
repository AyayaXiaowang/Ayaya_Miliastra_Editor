<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例 UI - 2</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1d1d23;
        color: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      :root {
        --safe-margin: 16px;
        --gap: 12px;
      }

      .page-root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .top-actions {
        position: absolute;
        top: var(--safe-margin);
        left: var(--safe-margin);
        display: flex;
        gap: var(--gap);
        z-index: 2000;
      }

      button.btn {
        display: inline-flex;
        align-items: stretch;
        justify-content: stretch;
        height: 38px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #ffffff;
        cursor: pointer;
      }

      .btn-text {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        flex: 1 1 auto;
        min-width: 0;
        font-size: 16px;
        line-height: 1;
      }

      .main-panel {
        position: absolute;
        left: 5%;
        right: 5%;
        top: 88px;
        bottom: 5%;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .tutorial-layer {
        position: absolute;
        inset: 0;
      }

      .highlight-display-area {
        position: absolute;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.04);
      }

      .tutorial-card {
        position: absolute;
        width: 260px;
        height: 110px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.60);
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tutorial-card .card-title {
        font-weight: 900;
        font-size: 16px;
        opacity: 0.95;
      }

      .tutorial-card .card-body {
        font-size: 13px;
        opacity: 0.88;
        line-height: 1.35;
      }

      .cta-row {
        position: absolute;
        left: 18px;
        right: 18px;
        top: 42px;
        display: flex;
        gap: 12px;
      }

      .cta-btn {
        flex: 1 1 auto;
        height: 40px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(0, 0, 0, 0.20);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div class="page-root">
      <div class="top-actions" data-ui-component-key="top_actions">
        <button class="btn" data-ui-key="btn_exit" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_exit_text"
            data-ui-text="退出"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >退出</span
          >
        </button>
        <button class="btn" data-ui-key="btn_level_select" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_level_select_text"
            data-ui-text="关卡选择"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >关卡选择</span
          >
        </button>
      </div>

      <div
        class="main-panel"
        data-debug-label="main-panel"
        data-ui-key="main-panel"
        data-ui-component-key="main_panel"
      >
        <div class="tutorial-layer" data-ui-state-group="tutorial_overlay">
          <div data-ui-state="guide_1" data-ui-state-default="1">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_1"
              style="left: 80px; top: 52px; width: 260px; height: 72px"
            ></div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_1</div>
              <div class="card-body">指引卡片固定锚定到高亮区域右侧。</div>
            </div>
          </div>

          <div data-ui-state="guide_2">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_2"
              style="left: 80px; top: 140px; width: 260px; height: 72px"
            ></div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_2</div>
              <div class="card-body">该页面用于回归 tutorial-card 不遮挡高亮区域。</div>
            </div>
          </div>

          <div data-ui-state="guide_3">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_3"
              style="left: 80px; top: 228px; width: 260px; height: 72px"
            ></div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_3</div>
              <div class="card-body">避免因分辨率变化导致卡片与挖空区域重叠。</div>
            </div>
          </div>

          <div data-ui-state="guide_4">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_4"
              style="left: 80px; top: 316px; width: 260px; height: 72px"
            ></div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_4</div>
              <div class="card-body">此处仅提供稳定几何布局，便于做四档分辨率回归。</div>
            </div>
          </div>

          <div data-ui-state="guide_5">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_5"
              style="left: 80px; top: 404px; width: 260px; height: 72px"
            ></div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_5</div>
              <div class="card-body">卡片将被 Workbench 预计算为 px 并自动 clamp 到安全边界。</div>
            </div>
          </div>

          <div data-ui-state="guide_6">
            <div
              class="highlight-display-area tutorial-marker"
              data-ui-state-group="tutorial_overlay"
              data-ui-state="guide_6"
              style="left: 80px; top: 492px; width: 320px; height: 96px"
            >
              <div class="cta-row">
                <div class="cta-btn">拒绝进入</div>
                <div class="cta-btn">允许进入</div>
              </div>
            </div>
            <div
              class="tutorial-card"
              data-debug-label="tutorial-card"
              data-tutorial-anchor="highlight"
              data-tutorial-anchor-placement="right"
            >
              <div class="card-title">guide_6</div>
              <div class="card-body">额外锚定：断言卡片不遮挡“拒绝进入/允许进入”。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
