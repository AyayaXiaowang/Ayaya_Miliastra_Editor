<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例 UI - ceshi</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1d1d23;
        color: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      :root {
        --safe-margin: 16px;
        --gap: 12px;
      }

      .page-root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .top-actions {
        position: absolute;
        top: var(--safe-margin);
        left: var(--safe-margin);
        display: flex;
        gap: var(--gap);
        z-index: 2000;
      }

      button.btn {
        display: inline-flex;
        align-items: stretch;
        justify-content: stretch;
        height: 38px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #ffffff;
        cursor: pointer;
      }

      .btn-text {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        flex: 1 1 auto;
        min-width: 0;
        font-size: 16px;
        line-height: 1;
      }

      .game-panel {
        position: absolute;
        left: 50%;
        top: 55%;
        transform: translate(-50%, -50%);
        width: 70%;
        height: 70%;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.14);
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px;
      }

      .panel-title {
        font-size: 22px;
        font-weight: 900;
        opacity: 0.95;
      }

      .panel-body {
        flex: 1;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
      }
    </style>
  </head>
  <body>
    <div class="page-root">
      <div class="top-actions" data-ui-component-key="top_actions">
        <button class="btn" data-ui-key="btn_exit" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_exit_text"
            data-ui-text="退出"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >退出</span
          >
        </button>
        <button class="btn" data-ui-key="btn_level_select" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_level_select_text"
            data-ui-text="关卡选择"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >关卡选择</span
          >
        </button>
      </div>

      <div
        class="game-panel"
        data-debug-label="game-panel"
        data-ui-key="game_panel"
        data-ui-component-key="game_panel"
      >
        <div class="panel-title">主弹窗（game-panel）</div>
        <div class="panel-body"></div>
      </div>
    </div>
  </body>
</html>
