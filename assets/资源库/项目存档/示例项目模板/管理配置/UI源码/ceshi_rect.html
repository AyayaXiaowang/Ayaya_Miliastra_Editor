<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例 UI - ceshi_rect</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1d1d23;
        color: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      :root {
        --safe-margin: 16px;
        --gap: 12px;
      }

      .page-root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .top-actions {
        position: absolute;
        top: var(--safe-margin);
        left: var(--safe-margin);
        display: flex;
        gap: var(--gap);
        z-index: 2000;
      }

      button.btn {
        display: inline-flex;
        align-items: stretch;
        justify-content: stretch;
        height: 38px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #ffffff;
        cursor: pointer;
      }

      .btn-text {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        flex: 1 1 auto;
        min-width: 0;
        font-size: 16px;
        line-height: 1;
      }

      .main-area {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        width: 78%;
        height: 74%;
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .level-grid {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .level-card {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.10);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .label {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        font-weight: 900;
      }

      .sub {
        opacity: 0.85;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="page-root">
      <div class="top-actions" data-ui-component-key="top_actions">
        <button class="btn" data-ui-key="btn_exit" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_exit_text"
            data-ui-text="退出"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >退出</span
          >
        </button>
        <button class="btn" data-ui-key="btn_level_select" data-ui-role="button">
          <span
            class="btn-text"
            data-ui-key="btn_level_select_text"
            data-ui-text="关卡选择"
            data-ui-text-align="center"
            data-ui-text-valign="middle"
            >关卡选择</span
          >
        </button>
      </div>

      <div class="main-area" data-ui-component-key="level_list" data-ui-key="level_list_panel">
        <div class="level-grid">
          <div class="level-card" data-ui-component-key="level_card_a" data-ui-key="level_card_a">
            <div
              class="label"
              data-ui-key="text-level-name"
              data-debug-label="text-level-name"
              data-ui-text="第4关"
              data-ui-text-align="center"
              data-ui-text-valign="middle"
            >
              第4关
            </div>
            <div
              class="sub"
              data-ui-key="text-level-author"
              data-debug-label="text-level-author"
              data-ui-text="作者：小王"
              data-ui-text-align="center"
              data-ui-text-valign="middle"
            >
              作者：小王
            </div>
          </div>

          <div class="level-card" data-ui-component-key="level_card_b" data-ui-key="level_card_b">
            <div
              class="label"
              data-ui-key="text-level-name-b"
              data-debug-label="text-level-name-b"
              data-ui-text="第5关"
              data-ui-text-align="center"
              data-ui-text-valign="middle"
            >
              第5关
            </div>
            <div class="sub" data-ui-key="text-level-author-b" data-ui-text-align="center" data-ui-text-valign="middle">
              作者：测试
            </div>
          </div>

          <div class="level-card" data-ui-component-key="level_card_c" data-ui-key="level_card_c">
            <div class="label" data-ui-key="text-level-name-c" data-ui-text-align="center" data-ui-text-valign="middle">
              第6关
            </div>
            <div class="sub" data-ui-key="text-level-author-c" data-ui-text-align="center" data-ui-text-valign="middle">
              作者：示例
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
